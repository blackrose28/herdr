# Optional HTTPS site — enable after placing Cloudflare origin cert.
upstream herdr_hub_ssl {
    server 127.0.0.1:3850;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name _HERDR_DOMAIN_PLACEHOLDER_;

    ssl_certificate /etc/ssl/herdr/origin.pem;
    ssl_certificate_key /etc/ssl/herdr/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 4m;

    # Dashboard static files
    root /opt/herdr/dashboard;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://herdr_hub_ssl;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://herdr_hub_ssl;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Health check proxy
    location = /health {
        proxy_pass http://herdr_hub_ssl;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
