# Managed by herdr-hub deploy. Proxies HTTP to the local Hub API + serves dashboard.
upstream herdr_hub {
    server 127.0.0.1:3850;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;

    # Replace via deploy: HERDR_DOMAIN=herdr.chuonglv.site
    server_name _HERDR_DOMAIN_PLACEHOLDER_;

    client_max_body_size 4m;

    # Dashboard static files (Vite build output)
    root /opt/herdr/dashboard;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://herdr_hub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket proxy (server + client gateways)
    location /ws/ {
        proxy_pass http://herdr_hub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # Keep WS alive for 24h
    }

    # Health check proxy
    location = /health {
        proxy_pass http://herdr_hub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
